<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SVG Motion Studio</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>html,body{margin:0;background:#14161C}</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const { useState, useMemo, useRef, useEffect, useCallback } = React;

// ============================================================
// SVG Motion Studio v2 — 複数SVGをシーンとしてつなげて1本の動画に
// ============================================================

const SAMPLE_SVG = `<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <rect id="背景" x="0" y="0" width="400" height="300" fill="#FFF6E9"/>
  <circle id="太陽" cx="320" cy="70" r="36" fill="#FFB347"/>
  <g id="山">
    <polygon points="60,260 160,120 260,260" fill="#5B8C5A"/>
    <polygon points="180,260 270,150 360,260" fill="#3E6B3D"/>
  </g>
  <text id="タイトル" x="200" y="60" font-size="30" font-weight="bold" text-anchor="middle" fill="#2F3E46" font-family="sans-serif">おいしい休憩を。</text>
</svg>`;

const ANIM_TYPES = {
  none: { label: "なし" },
  fadeIn: { label: "フェードイン" },
  slideUp: { label: "スライド（下から）" },
  slideDown: { label: "スライド（上から）" },
  slideLeft: { label: "スライド（右から）" },
  slideRight: { label: "スライド（左から）" },
  zoomIn: { label: "ズームイン" },
  pop: { label: "ポップ（弾む）" },
  rotateIn: { label: "回転イン" },
  draw: { label: "線描画（ストローク）" },
  float: { label: "ふわふわ（ループ）" },
  pulse: { label: "脈打つ（ループ）" },
  spin: { label: "回転し続ける（ループ）" },
  panLeft: { label: "パン：右→左に流す" },
  panRight: { label: "パン：左→右に流す" },
  panUp: { label: "パン：下→上に流す" },
  panDown: { label: "パン：上→下に流す" },
  zoomSlow: { label: "徐々にズームアップ" },
  zoomOutSlow: { label: "徐々にズームアウト" },
  kenburns: { label: "パン＋ズーム（Ken Burns風）" },
};

const PAN_TYPES = new Set(["panLeft", "panRight", "panUp", "panDown"]);
const ZOOM_TYPES = new Set(["zoomSlow", "zoomOutSlow", "kenburns"]);
const LOOP_TYPES = new Set(["float", "pulse", "spin", "panLeft", "panRight", "panUp", "panDown"]);
const isLoop = (s) => (s.loop === null || s.loop === undefined ? LOOP_TYPES.has(s.type) : s.loop);

const EASINGS = {
  "ease-out": "標準（ease-out）",
  "ease-in-out": "なめらか（ease-in-out）",
  "cubic-bezier(0.34,1.56,0.64,1)": "バウンス気味",
  linear: "一定速度（linear）",
  "ease-in": "加速（ease-in）",
};

const TRANSITIONS = {
  cut: "カット（切替のみ）",
  fade: "クロスフェード",
  slideLeft: "スライド（右→左）",
  slideUp: "スライド（下→上）",
  zoom: "ズームフェード",
};

const FRAMES = {
  original: { label: "元のサイズ", dims: null },
  "1:1": { label: "1:1（1080×1080）", dims: [1080, 1080] },
  "9:16": { label: "9:16（1080×1920）", dims: [1080, 1920] },
  "16:9": { label: "16:9（1920×1080）", dims: [1920, 1080] },
};

const ALIGNS = {
  "xMidYMid": "中央",
  "xMidYMin": "上寄せ",
  "xMidYMax": "下寄せ",
  "xMinYMid": "左寄せ",
  "xMaxYMid": "右寄せ",
};

const PART_COLORS = ["#FFB84D", "#6EC6FF", "#8BE28B", "#FF8FA3", "#C9A6FF", "#5FD6C4", "#F2E86D", "#FF9E6E"];

const defaultSetting = () => ({
  type: "fadeIn", duration: 0.8, delay: 0, easing: "ease-out",
  distance: 60, scaleTo: 1.3, loop: null, clip: false,
});

let sceneSeq = 0;
const newSceneId = () => `sc_${++sceneSeq}_${Date.now()}`;

// ---------- SVG parsing ----------
function getPartsChildren(root) {
  let children = Array.from(root.children).filter((el) => !["defs", "style", "title", "desc", "metadata"].includes(el.tagName));
  if (children.length === 1 && children[0].tagName === "g") {
    children = Array.from(children[0].children).filter((el) => !["defs", "style", "title", "desc"].includes(el.tagName));
  }
  return children;
}

function parseSvg(svgText) {
  try {
    const doc = new DOMParser().parseFromString(svgText, "image/svg+xml");
    if (doc.querySelector("parsererror")) return { error: "SVGの解析に失敗しました。コードを確認してください。" };
    const root = doc.querySelector("svg");
    if (!root) return { error: "<svg>タグが見つかりません。" };
    const children = getPartsChildren(root);
    const parts = children.map((el, i) => {
      const name = el.getAttribute("id") || el.getAttribute("aria-label") || `${el.tagName}${el.textContent && el.tagName === "text" ? `「${el.textContent.slice(0, 8)}」` : ""} #${i + 1}`;
      const hasImage = el.tagName === "image" || !!el.querySelector("image");
      return { uid: `p${i}`, name, tag: el.tagName, hasImage };
    });
    return { doc, root, children, parts };
  } catch (e) {
    return { error: "SVGの解析中にエラーが発生しました。" };
  }
}

function initSettings(svgText) {
  const parsed = parseSvg(svgText);
  if (parsed.error) return {};
  const settings = {};
  parsed.parts.forEach((p, i) => {
    settings[p.uid] = { ...defaultSetting(), delay: +(i * 0.25).toFixed(2) };
  });
  return settings;
}

function animEnd(settings) {
  let t = 0;
  Object.values(settings || {}).forEach((s) => {
    if (s.type === "none" || isLoop(s)) return;
    t = Math.max(t, s.delay + s.duration);
  });
  return t;
}

// ---------- keyframes ----------
function keyframesCss(uid, s) {
  const d = s.distance;
  const k = `kf_${uid}`;
  switch (s.type) {
    case "fadeIn": return `@keyframes ${k}{from{opacity:0}to{opacity:1}}`;
    case "slideUp": return `@keyframes ${k}{from{opacity:0;transform:translateY(${d}px)}to{opacity:1;transform:translateY(0)}}`;
    case "slideDown": return `@keyframes ${k}{from{opacity:0;transform:translateY(-${d}px)}to{opacity:1;transform:translateY(0)}}`;
    case "slideLeft": return `@keyframes ${k}{from{opacity:0;transform:translateX(${d}px)}to{opacity:1;transform:translateX(0)}}`;
    case "slideRight": return `@keyframes ${k}{from{opacity:0;transform:translateX(-${d}px)}to{opacity:1;transform:translateX(0)}}`;
    case "zoomIn": return `@keyframes ${k}{from{opacity:0;transform:scale(0)}to{opacity:1;transform:scale(1)}}`;
    case "pop": return `@keyframes ${k}{0%{opacity:0;transform:scale(0)}70%{opacity:1;transform:scale(1.15)}100%{opacity:1;transform:scale(1)}}`;
    case "rotateIn": return `@keyframes ${k}{from{opacity:0;transform:rotate(-120deg) scale(.5)}to{opacity:1;transform:rotate(0) scale(1)}}`;
    case "draw": return `@keyframes ${k}{from{stroke-dashoffset:1}to{stroke-dashoffset:0}}`;
    case "float": return `@keyframes ${k}{0%,100%{transform:translateY(0)}50%{transform:translateY(-${Math.max(4, d / 4)}px)}}`;
    case "pulse": return `@keyframes ${k}{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}`;
    case "spin": return `@keyframes ${k}{from{transform:rotate(0)}to{transform:rotate(360deg)}}`;
    case "panLeft": return `@keyframes ${k}{from{transform:translateX(${d}px)}to{transform:translateX(-${d}px)}}`;
    case "panRight": return `@keyframes ${k}{from{transform:translateX(-${d}px)}to{transform:translateX(${d}px)}}`;
    case "panUp": return `@keyframes ${k}{from{transform:translateY(${d}px)}to{transform:translateY(-${d}px)}}`;
    case "panDown": return `@keyframes ${k}{from{transform:translateY(-${d}px)}to{transform:translateY(${d}px)}}`;
    case "zoomSlow": return `@keyframes ${k}{from{transform:scale(1)}to{transform:scale(${s.scaleTo})}}`;
    case "zoomOutSlow": return `@keyframes ${k}{from{transform:scale(${s.scaleTo})}to{transform:scale(1)}}`;
    case "kenburns": return `@keyframes ${k}{from{transform:scale(1) translate(0,0)}to{transform:scale(${s.scaleTo}) translate(-${Math.round(d / 3)}px,-${Math.round(d / 6)}px)}}`;
    default: return "";
  }
}

function buildAnimatedSvg(svgText, settings, { forExport = false, staticMode = false, frame = null } = {}) {
  const parsed = parseSvg(svgText);
  if (parsed.error) return "";
  const doc = parsed.doc;
  const root = parsed.root;
  const children = parsed.children;

  let css = "";
  const viewBox = (root.getAttribute("viewBox") || "").split(/[\s,]+/).map(Number);
  const hasVB = viewBox.length === 4 && viewBox.every((n) => !isNaN(n));
  let defs = root.querySelector("defs");

  children.forEach((el, i) => {
    const uid = `p${i}`;
    const s = settings[uid];
    el.setAttribute("class", ((el.getAttribute("class") || "") + ` anim-${uid}`).trim());
    if (!s || staticMode) return;

    if (s.clip && hasVB) {
      if (!defs) {
        defs = doc.createElementNS("http://www.w3.org/2000/svg", "defs");
        root.insertBefore(defs, root.firstChild);
      }
      const clipId = `clip_${uid}`;
      if (!doc.getElementById(clipId)) {
        const cp = doc.createElementNS("http://www.w3.org/2000/svg", "clipPath");
        cp.setAttribute("id", clipId);
        const r = doc.createElementNS("http://www.w3.org/2000/svg", "rect");
        r.setAttribute("x", viewBox[0]); r.setAttribute("y", viewBox[1]);
        r.setAttribute("width", viewBox[2]); r.setAttribute("height", viewBox[3]);
        cp.appendChild(r);
        defs.appendChild(cp);
      }
      const wrapper = doc.createElementNS("http://www.w3.org/2000/svg", "g");
      wrapper.setAttribute("clip-path", `url(#${clipId})`);
      el.parentNode.insertBefore(wrapper, el);
      wrapper.appendChild(el);
    }

    if (s.type === "none") return;
    if (s.type === "draw") {
      el.setAttribute("pathLength", "1");
      el.setAttribute("stroke-dasharray", "1");
    }
    const loop = isLoop(s);
    css += keyframesCss(uid, s);
    css += `.anim-${uid}{animation:kf_${uid} ${s.duration}s ${s.easing} ${s.delay}s ${loop ? "infinite" : "1"} both;transform-box:fill-box;transform-origin:center;}`;
  });

  if (css) {
    const styleEl = doc.createElementNS("http://www.w3.org/2000/svg", "style");
    styleEl.textContent = css;
    root.insertBefore(styleEl, root.firstChild);
  }
  if (forExport && !root.getAttribute("xmlns")) root.setAttribute("xmlns", "http://www.w3.org/2000/svg");

  // フレームラップ：指定アスペクト比の外枠に収める（cover=切り抜き / contain=余白）
  const fr = frame && FRAMES[frame.ratio]?.dims ? frame : null;
  if (fr) {
    const [W, H] = FRAMES[fr.ratio].dims;
    root.setAttribute("width", W);
    root.setAttribute("height", H);
    root.setAttribute("preserveAspectRatio", `${fr.align || "xMidYMid"} ${fr.fit === "contain" ? "meet" : "slice"}`);
    root.removeAttribute("x"); root.removeAttribute("y");
    const inner = new XMLSerializer().serializeToString(root);
    return `<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 ${W} ${H}" width="${W}" height="${H}"><rect width="${W}" height="${H}" fill="${fr.bg || "#FFFFFF"}"/>${inner}</svg>`;
  }
  return new XMLSerializer().serializeToString(root);
}

function replaceImageInPart(svgText, uid, dataUrl) {
  const parsed = parseSvg(svgText);
  if (parsed.error) return svgText;
  const idx = +uid.slice(1);
  const el = parsed.children[idx];
  if (!el) return svgText;
  const img = el.tagName === "image" ? el : el.querySelector("image");
  if (!img) return svgText;
  img.setAttribute("href", dataUrl);
  img.setAttributeNS("http://www.w3.org/1999/xlink", "xlink:href", dataUrl);
  if (!parsed.root.getAttribute("xmlns")) parsed.root.setAttribute("xmlns", "http://www.w3.org/2000/svg");
  return new XMLSerializer().serializeToString(parsed.root);
}

// ---------- 通し再生プレイヤー ----------
function SequencePlayer({ scenes, onClose }) {
  const [layers, setLayers] = useState([]);
  const [info, setInfo] = useState({ idx: 0, done: false });
  const [token, setToken] = useState(0);

  useEffect(() => {
    let cancelled = false;
    const timers = [];
    setLayers([]);
    setInfo({ idx: 0, done: false });
    const step = (i) => {
      if (cancelled) return;
      if (i >= scenes.length) { setInfo((v) => ({ ...v, done: true })); return; }
      const trans = i === 0 ? { type: "cut", duration: 0 } : scenes[i - 1].transition;
      setInfo({ idx: i, done: false });
      setLayers((ls) => [...ls.slice(-1), { key: `${token}_${i}`, svg: scenes[i].playSvg, trans }]);
      timers.push(setTimeout(() => {
        if (!cancelled) setLayers((ls) => ls.filter((l) => l.key === `${token}_${i}`));
      }, (trans.duration || 0) * 1000 + 60));
      timers.push(setTimeout(() => step(i + 1), Math.max(0.3, scenes[i].duration) * 1000));
    };
    step(0);
    return () => { cancelled = true; timers.forEach(clearTimeout); };
  }, [token, scenes]);

  const transStyle = (trans) => {
    if (!trans || trans.type === "cut" || !trans.duration) return {};
    const map = {
      fade: "seqFade", slideLeft: "seqSlideL", slideUp: "seqSlideU", zoom: "seqZoom",
    };
    return { animation: `${map[trans.type] || "seqFade"} ${trans.duration}s ease both` };
  };

  return (
    <div style={{ position: "fixed", inset: 0, background: "#000000E6", zIndex: 50, display: "flex", flexDirection: "column" }}>
      <style>{`
        @keyframes seqFade{from{opacity:0}to{opacity:1}}
        @keyframes seqSlideL{from{transform:translateX(100%)}to{transform:translateX(0)}}
        @keyframes seqSlideU{from{transform:translateY(100%)}to{transform:translateY(0)}}
        @keyframes seqZoom{from{opacity:0;transform:scale(1.08)}to{opacity:1;transform:scale(1)}}
        .seqLayer svg{width:100%;height:100%;display:block}
      `}</style>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "10px 18px", color: "#EDEEF2" }}>
        <span style={{ fontSize: 13, fontFamily: "'DM Mono',monospace" }}>
          {info.done ? "✔ 再生完了" : `シーン ${info.idx + 1} / ${scenes.length}　${scenes[info.idx]?.name || ""}`}
        </span>
        <div style={{ display: "flex", gap: 8 }}>
          <button className="btn" onClick={() => setToken((t) => t + 1)} style={{ background: "#5FD6C4", color: "#14161C", border: "none", borderRadius: 8, padding: "7px 16px", fontWeight: 700, cursor: "pointer", fontSize: 13 }}>▶ 最初から</button>
          <button className="btn" onClick={onClose} style={{ background: "#1D2129", color: "#C9CDD6", border: "1px solid #333A4A", borderRadius: 8, padding: "7px 16px", cursor: "pointer", fontSize: 13 }}>閉じる</button>
        </div>
      </div>
      <div style={{ flex: 1, display: "grid", placeItems: "center", padding: 16, minHeight: 0 }}>
        <div style={{ position: "relative", height: "100%", aspectRatio: scenes[0]?.aspect || "9/16", maxWidth: "100%", background: "#fff", borderRadius: 8, overflow: "hidden", boxShadow: "0 16px 60px #000" }}>
          {layers.map((l) => (
            <div key={l.key} className="seqLayer" style={{ position: "absolute", inset: 0, ...transStyle(l.trans) }} dangerouslySetInnerHTML={{ __html: l.svg }} />
          ))}
        </div>
      </div>
      {/* シーン進行バー */}
      <div style={{ display: "flex", gap: 4, padding: "0 18px 14px" }}>
        {scenes.map((s, i) => (
          <div key={i} style={{ flex: s.duration, height: 5, borderRadius: 3, background: i < info.idx || info.done ? "#8B7CFF" : i === info.idx ? "#5FD6C4" : "#2A2F40" }} />
        ))}
      </div>
    </div>
  );
}

// ---------- HTML書き出し ----------
function buildExportHtml(scenes) {
  const data = scenes.map((s) => ({ svg: s.playSvg, duration: s.duration, transition: s.transition, name: s.name }));
  const json = JSON.stringify(data).replace(/<\/script/gi, "<\\/script");
  return `<!DOCTYPE html><html lang="ja"><head><meta charset="utf-8"><title>SVG Motion Video</title>
<style>
html,body{margin:0;height:100%;background:#000;overflow:hidden}
#stage{position:relative;height:100vh;margin:0 auto;background:#fff;overflow:hidden}
.layer{position:absolute;inset:0}
.layer svg{width:100%;height:100%;display:block}
@keyframes seqFade{from{opacity:0}to{opacity:1}}
@keyframes seqSlideL{from{transform:translateX(100%)}to{transform:translateX(0)}}
@keyframes seqSlideU{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes seqZoom{from{opacity:0;transform:scale(1.08)}to{opacity:1;transform:scale(1)}}
#hint{position:fixed;top:12px;left:12px;color:#fff;font:13px/1.6 sans-serif;background:#000A;padding:8px 12px;border-radius:8px;transition:opacity .4s}
</style></head><body>
<div id="stage"></div>
<div id="hint">クリックで再生／リプレイ（録画するときはフルスクリーン推奨）</div>
<script>
const SCENES=${json};
const stage=document.getElementById('stage');
const hint=document.getElementById('hint');
function fit(){
  const p=new DOMParser().parseFromString(SCENES[0].svg,'image/svg+xml');
  const vb=(p.querySelector('svg').getAttribute('viewBox')||'0 0 16 9').split(/[\\s,]+/).map(Number);
  stage.style.aspectRatio=vb[2]+'/'+vb[3];
  stage.style.width=Math.min(window.innerWidth,window.innerHeight*vb[2]/vb[3])+'px';
}
fit();window.addEventListener('resize',fit);
let timers=[];
function play(){
  timers.forEach(clearTimeout);timers=[];stage.innerHTML='';hint.style.opacity=0;
  const step=(i)=>{
    if(i>=SCENES.length){hint.style.opacity=1;hint.textContent='再生完了 — クリックでリプレイ';return;}
    const sc=SCENES[i];
    const trans=i===0?{type:'cut',duration:0}:SCENES[i-1].transition;
    const div=document.createElement('div');div.className='layer';div.innerHTML=sc.svg;
    const map={fade:'seqFade',slideLeft:'seqSlideL',slideUp:'seqSlideU',zoom:'seqZoom'};
    if(trans.type!=='cut'&&trans.duration>0)div.style.animation=(map[trans.type]||'seqFade')+' '+trans.duration+'s ease both';
    stage.appendChild(div);
    timers.push(setTimeout(()=>{while(stage.children.length>1&&stage.firstChild!==div)stage.removeChild(stage.firstChild);},(trans.duration||0)*1000+60));
    timers.push(setTimeout(()=>step(i+1),Math.max(0.3,sc.duration)*1000));
  };
  step(0);
}
document.body.addEventListener('click',play);
</scr${''}ipt></body></html>`;
}

// ============================================================
function SvgMotionStudio() {
  const [scenes, setScenes] = useState(() => {
    const id = newSceneId();
    return [{ id, name: "サンプル", svgText: SAMPLE_SVG, settings: initSettings(SAMPLE_SVG), duration: 3, transition: { type: "fade", duration: 0.6 } }];
  });
  const [activeId, setActiveId] = useState(scenes[0]?.id ?? null);
  const [selected, setSelected] = useState("p0");
  const [inputOpen, setInputOpen] = useState(false);
  const [playKey, setPlayKey] = useState(0);
  const [playing, setPlaying] = useState(true);
  const [seqOpen, setSeqOpen] = useState(false);
  const [frame, setFrame] = useState({ ratio: "original", fit: "cover", align: "xMidYMid", bg: "#FFFFFF" });
  const fileRef = useRef(null);
  const imgRef = useRef(null);

  const scene = scenes.find((s) => s.id === activeId) || scenes[0];
  const parsed = useMemo(() => (scene ? parseSvg(scene.svgText) : { error: "シーンがありません" }), [scene?.svgText]);
  const settings = scene?.settings || {};

  useEffect(() => {
    if (!parsed.parts) return;
    if (!parsed.parts.some((p) => p.uid === selected)) setSelected(parsed.parts[0]?.uid ?? null);
  }, [activeId, parsed]);

  const updateScene = useCallback((id, patch) => setScenes((sc) => sc.map((s) => (s.id === id ? { ...s, ...patch } : s))), []);
  const update = useCallback((uid, patch) => {
    updateScene(scene.id, { settings: { ...scene.settings, [uid]: { ...scene.settings[uid], ...patch } } });
  }, [scene, updateScene]);

  const sceneAnimEnd = animEnd(settings);
  const previewSvg = useMemo(
    () => (scene ? buildAnimatedSvg(scene.svgText, settings, { staticMode: !playing, frame }) : ""),
    [scene?.svgText, settings, playing, playKey, frame]
  );

  const replay = () => { setPlaying(true); setPlayKey((k) => k + 1); };

  // ---------- シーン操作 ----------
  const addScenesFromFiles = (files) => {
    const list = Array.from(files).filter((f) => f.name.toLowerCase().endsWith(".svg") || f.type === "image/svg+xml");
    list.sort((a, b) => a.name.localeCompare(b.name, "ja", { numeric: true }));
    Promise.all(list.map((f) => new Promise((res) => {
      const r = new FileReader();
      r.onload = () => res({ name: f.name.replace(/\.svg$/i, ""), text: String(r.result) });
      r.readAsText(f);
    }))).then((results) => {
      const added = results.map((r) => {
        const settings = initSettings(r.text);
        return {
          id: newSceneId(), name: r.name, svgText: r.text, settings,
          duration: Math.max(3, +(animEnd(settings) + 1.5).toFixed(1)),
          transition: { type: "fade", duration: 0.6 },
        };
      });
      setScenes((sc) => [...sc, ...added]);
      if (added[0]) setActiveId(added[0].id);
    });
  };

  const moveScene = (id, dir) => setScenes((sc) => {
    const i = sc.findIndex((s) => s.id === id);
    const j = i + dir;
    if (j < 0 || j >= sc.length) return sc;
    const next = [...sc];
    [next[i], next[j]] = [next[j], next[i]];
    return next;
  });
  const removeScene = (id) => setScenes((sc) => {
    const next = sc.filter((s) => s.id !== id);
    if (id === activeId && next[0]) setActiveId(next[0].id);
    return next;
  });
  const duplicateScene = (id) => setScenes((sc) => {
    const i = sc.findIndex((s) => s.id === id);
    const copy = { ...sc[i], id: newSceneId(), name: sc[i].name + " コピー", settings: JSON.parse(JSON.stringify(sc[i].settings)) };
    return [...sc.slice(0, i + 1), copy, ...sc.slice(i + 1)];
  });

  // ---------- 書き出し ----------
  const download = (content, filename, type) => {
    const blob = new Blob([content], { type });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = filename; a.click();
    URL.revokeObjectURL(url);
  };
  const buildPlayScenes = () => scenes.map((s) => {
    const p = parseSvg(s.svgText);
    const vb = p.root ? (p.root.getAttribute("viewBox") || "0 0 16 9").split(/[\s,]+/).map(Number) : [0, 0, 16, 9];
    const fd = FRAMES[frame.ratio]?.dims;
    return { ...s, playSvg: buildAnimatedSvg(s.svgText, s.settings, { forExport: true, frame }), aspect: fd ? `${fd[0]}/${fd[1]}` : `${vb[2]}/${vb[3]}` };
  });
  const exportSvg = () => download(buildAnimatedSvg(scene.svgText, settings, { forExport: true, frame }), `${scene.name || "animated"}.svg`, "image/svg+xml");
  const exportHtml = () => download(buildExportHtml(buildPlayScenes()), "svg-motion-video.html", "text/html");

  const onImgReplace = (e) => {
    const f = e.target.files?.[0];
    if (!f) return;
    const r = new FileReader();
    r.onload = () => updateScene(scene.id, { svgText: replaceImageInPart(scene.svgText, selected, String(r.result)) });
    r.readAsDataURL(f);
    e.target.value = "";
  };

  const totalVideo = scenes.reduce((a, s) => a + Math.max(0.3, s.duration), 0);
  const sel = selected && settings[selected] ? settings[selected] : null;
  const selPart = parsed.parts?.find((p) => p.uid === selected);
  const tlMax = Math.max(sceneAnimEnd, 0.5);

  const S = styles;
  return (
    <div style={S.app}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap');
        *{box-sizing:border-box} ::selection{background:#8B7CFF55}
        input,select,button,textarea{font-family:inherit}
        input[type=range]{accent-color:#8B7CFF}
        .partRow:hover{background:#262B38 !important}
        .btn:hover{filter:brightness(1.15)}
        .btn:focus-visible,select:focus-visible,input:focus-visible,textarea:focus-visible{outline:2px solid #8B7CFF;outline-offset:2px}
        .sceneCard:hover{border-color:#8B7CFF88 !important}
        .sceneCard svg{width:100%;height:auto;display:block}
        .previewBox svg{width:auto;height:auto;max-width:100%;max-height:54vh;display:block}
        @media (prefers-reduced-motion: reduce){ svg *{animation-duration:0.01s !important} }
      `}</style>

      {/* Header */}
      <header style={S.header}>
        <div style={{ display: "flex", alignItems: "baseline", gap: 12, flexWrap: "wrap" }}>
          <span style={S.logo}>SVG<span style={{ color: "#8B7CFF" }}>▸</span>Motion Studio</span>
          <span style={S.sub}>複数SVG → 1本の動画</span>
        </div>
        <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
          <button className="btn" style={S.ghostBtn} onClick={() => setInputOpen((v) => !v)}>{inputOpen ? "コード編集を閉じる" : "SVGコード編集"}</button>
          <button className="btn" style={S.ghostBtn} onClick={exportSvg}>このシーンをSVG書き出し</button>
          <button className="btn" style={S.ghostBtn} onClick={exportHtml}>動画HTML書き出し</button>
          <button className="btn" style={S.primaryBtn} onClick={() => setSeqOpen(true)}>▶ 通し再生（{totalVideo.toFixed(1)}s）</button>
        </div>
      </header>

      {/* フレーム設定 */}
      <div style={S.frameBar}>
        <span style={S.frameLabel}>出力サイズ</span>
        {Object.entries(FRAMES).map(([k, v]) => (
          <button key={k} className="btn" onClick={() => setFrame((f) => ({ ...f, ratio: k }))}
            style={{ ...S.frameBtn, ...(frame.ratio === k ? S.frameBtnActive : {}) }}>{v.label}</button>
        ))}
        {frame.ratio !== "original" && (
          <>
            <span style={{ ...S.frameLabel, marginLeft: 10 }}>収め方</span>
            <select style={S.transSelect} value={frame.fit} onChange={(e) => setFrame((f) => ({ ...f, fit: e.target.value }))}>
              <option value="cover">切り抜き（カバー）</option>
              <option value="contain">全体表示（余白）</option>
            </select>
            <select style={S.transSelect} value={frame.align} onChange={(e) => setFrame((f) => ({ ...f, align: e.target.value }))} title="位置">
              {Object.entries(ALIGNS).map(([k, v]) => <option key={k} value={k}>{v}</option>)}
            </select>
            {frame.fit === "contain" && (
              <label style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 11.5, color: "#9AA0AE" }}>
                余白色
                <input type="color" value={frame.bg} onChange={(e) => setFrame((f) => ({ ...f, bg: e.target.value }))}
                  style={{ width: 26, height: 22, border: "1px solid #333A4A", borderRadius: 5, background: "#1D2129", padding: 1, cursor: "pointer" }} />
              </label>
            )}
          </>
        )}
      </div>

      {/* シーンストリップ */}
      <div style={S.sceneStrip}>
        {scenes.map((s, i) => {
          const active = s.id === activeId;
          const thumb = getSceneThumb(s.svgText);
          return (
            <div key={s.id} style={{ display: "flex", alignItems: "center", gap: 6 }}>
              <div className="sceneCard" onClick={() => setActiveId(s.id)}
                style={{ ...S.sceneCard, borderColor: active ? "#8B7CFF" : "#333A4A", boxShadow: active ? "0 0 0 1px #8B7CFF" : "none" }}>
                <div style={S.sceneThumb} dangerouslySetInnerHTML={{ __html: thumb }} />
                <div style={S.sceneCardBody}>
                  <div style={S.sceneName} title={s.name}>{i + 1}. {s.name}</div>
                  <div style={{ display: "flex", alignItems: "center", gap: 4 }}>
                    <input type="number" min="0.5" step="0.5" value={s.duration}
                      onClick={(e) => e.stopPropagation()}
                      onChange={(e) => updateScene(s.id, { duration: Math.max(0.3, +e.target.value || 0.3) })}
                      style={S.durInput} aria-label="シーンの長さ（秒）" />
                    <span style={{ fontSize: 10, color: "#9AA0AE" }}>秒</span>
                  </div>
                </div>
                <div style={S.sceneOps} onClick={(e) => e.stopPropagation()}>
                  <button className="btn" style={S.miniBtn} onClick={() => moveScene(s.id, -1)} title="左へ">◀</button>
                  <button className="btn" style={S.miniBtn} onClick={() => moveScene(s.id, 1)} title="右へ">▶</button>
                  <button className="btn" style={S.miniBtn} onClick={() => duplicateScene(s.id)} title="複製">⧉</button>
                  <button className="btn" style={{ ...S.miniBtn, color: "#FF8FA3" }} onClick={() => removeScene(s.id)} title="削除">✕</button>
                </div>
              </div>
              {i < scenes.length - 1 && (
                <select
                  value={s.transition.type}
                  onChange={(e) => updateScene(s.id, { transition: { ...s.transition, type: e.target.value, duration: e.target.value === "cut" ? 0 : (s.transition.duration || 0.6) } })}
                  style={S.transSelect} title="次のシーンへのトランジション">
                  {Object.entries(TRANSITIONS).map(([k, v]) => <option key={k} value={k}>{v}</option>)}
                </select>
              )}
            </div>
          );
        })}
        <button className="btn" style={S.addSceneBtn} onClick={() => fileRef.current?.click()}>＋ SVGを追加<br /><span style={{ fontSize: 10, fontWeight: 400 }}>（複数選択OK）</span></button>
        <input ref={fileRef} type="file" accept=".svg,image/svg+xml" multiple style={{ display: "none" }} onChange={(e) => { addScenesFromFiles(e.target.files); e.target.value = ""; }} />
      </div>

      {/* SVGコード編集 */}
      {inputOpen && scene && (
        <div style={S.inputPanel}>
          <textarea style={S.textarea} value={scene.svgText} spellCheck={false} aria-label="SVGコード"
            onChange={(e) => {
              const text = e.target.value;
              const p = parseSvg(text);
              const nextSettings = {};
              if (p.parts) p.parts.forEach((pt, i) => { nextSettings[pt.uid] = scene.settings[pt.uid] || { ...defaultSetting(), delay: +(i * 0.25).toFixed(2) }; });
              updateScene(scene.id, { svgText: text, settings: nextSettings });
            }} />
          <p style={S.hint}>編集中のシーン：{scene.name}。レイヤーにid名を付けるとパーツ名として表示されます。</p>
        </div>
      )}

      {parsed.error ? (
        <div style={S.errorBox}>{parsed.error}</div>
      ) : (
        <div style={S.main}>
          {/* Parts list */}
          <aside style={S.leftPanel}>
            <div style={S.panelTitle}>パーツ（{parsed.parts.length}）</div>
            <div style={{ overflowY: "auto", flex: 1 }}>
              {parsed.parts.map((p, i) => {
                const s = settings[p.uid];
                const active = selected === p.uid;
                return (
                  <div key={p.uid} className="partRow" onClick={() => setSelected(p.uid)}
                    style={{ ...S.partRow, background: active ? "#2A2F40" : "transparent", borderLeft: `3px solid ${active ? PART_COLORS[i % 8] : "transparent"}` }}>
                    <span style={{ ...S.partDot, background: PART_COLORS[i % 8] }} />
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <div style={S.partName}>{p.hasImage ? "🖼 " : ""}{p.name}</div>
                      <div style={S.partMeta}>{s ? ANIM_TYPES[s.type].label : ""}{s && s.type !== "none" ? ` ・ ${s.duration}s` : ""}</div>
                    </div>
                  </div>
                );
              })}
            </div>
          </aside>

          {/* Center */}
          <section style={S.center}>
            <div style={S.previewWrap}>
              <div key={`${activeId}_${playKey}`} className="previewBox" style={S.previewInner} dangerouslySetInnerHTML={{ __html: previewSvg }} />
            </div>
            <div style={S.controls}>
              <button className="btn" style={S.playBtn} onClick={replay}>▶ シーン再生</button>
              <button className="btn" style={S.ghostBtn} onClick={() => setPlaying(false)}>⏹ 静止表示</button>
              <span style={S.durLabel}>登場アニメ：<b style={{ color: "#EDEEF2" }}>{sceneAnimEnd.toFixed(2)}s</b> ／ シーン長：<b style={{ color: "#EDEEF2" }}>{scene.duration}s</b></span>
            </div>

            {/* Timeline */}
            <div style={S.timeline}>
              <div style={S.panelTitle}>タイムライン（このシーン）</div>
              <div style={{ position: "relative", padding: "4px 0 2px" }}>
                {[0, 0.25, 0.5, 0.75, 1].map((f) => (
                  <span key={f} style={{ ...S.tick, left: `calc(120px + (100% - 132px) * ${f})` }}>{(tlMax * f).toFixed(1)}s</span>
                ))}
              </div>
              <div style={{ maxHeight: 140, overflowY: "auto" }}>
                {parsed.parts.map((p, i) => {
                  const s = settings[p.uid];
                  if (!s) return null;
                  const loop = isLoop(s);
                  const left = (s.delay / tlMax) * 100;
                  const width = s.type === "none" ? 0 : (Math.min(s.duration, tlMax) / tlMax) * 100;
                  return (
                    <div key={p.uid} style={S.tlRow} onClick={() => setSelected(p.uid)}>
                      <span style={{ ...S.tlName, color: selected === p.uid ? "#EDEEF2" : "#9AA0AE" }}>{p.name}</span>
                      <div style={S.tlTrack}>
                        {s.type !== "none" && (
                          <div style={{
                            ...S.tlBar,
                            left: `${Math.min(left, 98)}%`,
                            width: loop ? `${100 - Math.min(left, 98)}%` : `${Math.max(width, 1.5)}%`,
                            background: loop ? `repeating-linear-gradient(45deg, ${PART_COLORS[i % 8]}, ${PART_COLORS[i % 8]} 6px, ${PART_COLORS[i % 8]}66 6px, ${PART_COLORS[i % 8]}66 12px)` : PART_COLORS[i % 8],
                          }} title={loop ? "ループ" : `${s.delay}s → ${(s.delay + s.duration).toFixed(2)}s`} />
                        )}
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          </section>

          {/* Settings */}
          <aside style={S.rightPanel}>
            <div style={S.panelTitle}>アニメーション設定</div>
            {sel && selPart ? (
              <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
                <div style={S.selName}>{selPart.name}</div>

                {selPart.hasImage && (
                  <>
                    <button className="btn" style={S.ghostBtn} onClick={() => imgRef.current?.click()}>🖼 画像を差し替え</button>
                    <input ref={imgRef} type="file" accept="image/*" style={{ display: "none" }} onChange={onImgReplace} />
                  </>
                )}

                <label style={S.field}>
                  <span style={S.label}>動きの種類</span>
                  <select style={S.select} value={sel.type} onChange={(e) => {
                    const t = e.target.value;
                    update(selected, { type: t, loop: null, ...(PAN_TYPES.has(t) || ZOOM_TYPES.has(t) ? { easing: "linear", duration: Math.max(sel.duration, 3) } : {}) });
                  }}>
                    <optgroup label="登場（1回）">
                      {Object.entries(ANIM_TYPES).filter(([k]) => !LOOP_TYPES.has(k) && !PAN_TYPES.has(k) && !ZOOM_TYPES.has(k)).map(([k, v]) => <option key={k} value={k}>{v.label}</option>)}
                    </optgroup>
                    <optgroup label="パン・ズーム（写真向き）">
                      {Object.entries(ANIM_TYPES).filter(([k]) => PAN_TYPES.has(k) || ZOOM_TYPES.has(k)).map(([k, v]) => <option key={k} value={k}>{v.label}</option>)}
                    </optgroup>
                    <optgroup label="ループ">
                      {["float", "pulse", "spin"].map((k) => <option key={k} value={k}>{ANIM_TYPES[k].label}</option>)}
                    </optgroup>
                  </select>
                </label>

                <label style={S.field}>
                  <span style={S.label}>時間（スピード）<b style={S.mono}>{sel.duration.toFixed(2)}s</b></span>
                  <input type="range" min="0.1" max="10" step="0.05" value={sel.duration} onChange={(e) => update(selected, { duration: +e.target.value })} />
                </label>

                <label style={S.field}>
                  <span style={S.label}>開始タイミング（遅延）<b style={S.mono}>{sel.delay.toFixed(2)}s</b></span>
                  <input type="range" min="0" max="8" step="0.05" value={sel.delay} onChange={(e) => update(selected, { delay: +e.target.value })} />
                </label>

                <label style={S.field}>
                  <span style={S.label}>イージング</span>
                  <select style={S.select} value={sel.easing} onChange={(e) => update(selected, { easing: e.target.value })}>
                    {Object.entries(EASINGS).map(([k, v]) => <option key={k} value={k}>{v}</option>)}
                  </select>
                </label>

                {(sel.type.startsWith("slide") || sel.type === "float" || PAN_TYPES.has(sel.type) || sel.type === "kenburns") && (
                  <label style={S.field}>
                    <span style={S.label}>移動距離<b style={S.mono}>{sel.distance}px</b></span>
                    <input type="range" min="10" max="800" step="5" value={sel.distance} onChange={(e) => update(selected, { distance: +e.target.value })} />
                  </label>
                )}

                {ZOOM_TYPES.has(sel.type) && (
                  <label style={S.field}>
                    <span style={S.label}>ズーム倍率<b style={S.mono}>×{sel.scaleTo.toFixed(2)}</b></span>
                    <input type="range" min="1.05" max="2.5" step="0.05" value={sel.scaleTo} onChange={(e) => update(selected, { scaleTo: +e.target.value })} />
                  </label>
                )}

                <label style={S.checkRow}>
                  <input type="checkbox" checked={isLoop(sel)} onChange={(e) => update(selected, { loop: e.target.checked })} />
                  <span>繰り返し再生（ループ）</span>
                </label>

                <label style={S.checkRow}>
                  <input type="checkbox" checked={!!sel.clip} onChange={(e) => update(selected, { clip: e.target.checked })} />
                  <span>枠内でクリップ（はみ出しを隠す）</span>
                </label>
                {PAN_TYPES.has(sel.type) && !sel.clip && <p style={S.hint}>パンで枠外にはみ出す場合は「枠内でクリップ」をオンに。</p>}
                {sel.type === "draw" && <p style={S.hint}>線描画はstroke（線）を持つ要素で効果があります。</p>}

                <div style={{ display: "flex", gap: 8, marginTop: 4 }}>
                  <button className="btn" style={{ ...S.ghostBtn, flex: 1 }} onClick={() => update(selected, defaultSetting())}>リセット</button>
                  <button className="btn" style={{ ...S.ghostBtn, flex: 1 }} onClick={() => {
                    updateScene(scene.id, { settings: Object.fromEntries(Object.keys(settings).map((k) => [k, { ...settings[selected] }])) });
                  }}>全パーツに適用</button>
                </div>
                <button className="btn" style={S.primaryBtn} onClick={replay}>▶ この設定で再生</button>
              </div>
            ) : (
              <p style={S.hint}>左のリストからパーツを選んでください。</p>
            )}
          </aside>
        </div>
      )}

      {seqOpen && <SequencePlayer scenes={buildPlayScenes()} onClose={() => setSeqOpen(false)} />}
    </div>
  );
}

// サムネイル（静止SVG）簡易キャッシュ
const thumbCache = new Map();
function getSceneThumb(svgText) {
  if (thumbCache.has(svgText)) return thumbCache.get(svgText);
  const t = buildAnimatedSvg(svgText, {}, { staticMode: true });
  if (thumbCache.size > 60) thumbCache.clear();
  thumbCache.set(svgText, t);
  return t;
}
